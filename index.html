<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freshdesk · Soporte TI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0c10;
  color: #e8edf2;
  min-height: 100vh;
  padding: 32px;
}

/* Header */
.header {
  max-width: 1200px;
  margin: 0 auto 32px auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo p {
  font-size: 13px;
  color: #6b7280;
  margin-top: 4px;
}

.status-badge {
  background: #1a1e2a;
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 13px;
  border: 1px solid #2a2f3f;
}

.status-badge span {
  color: #4f8ef7;
  font-weight: 600;
}

/* KPI Grid */
.kpi-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.kpi-card {
  background: #11161f;
  border-radius: 20px;
  padding: 24px;
  border: 1px solid #1e2535;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.kpi-card:hover {
  border-color: #2a3448;
  transform: translateY(-2px);
}

.kpi-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--color);
}

.kpi-label {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
  color: #8b92a8;
  margin-bottom: 12px;
}

.kpi-number {
  font-size: 48px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  margin-bottom: 8px;
}

.kpi-percent {
  font-size: 13px;
  color: #6b7280;
}

/* Loading y error */
.loading, .error {
  max-width: 1200px;
  margin: 60px auto;
  text-align: center;
  padding: 48px;
  background: #11161f;
  border-radius: 20px;
  border: 1px solid #1e2535;
}

.spinner {
  width: 40px;
  height: 40px;
  margin: 0 auto 16px;
  border: 2px solid #1e2535;
  border-top-color: #4f8ef7;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error {
  color: #f87171;
  border-color: rgba(248,113,113,0.2);
}

.info-box {
  max-width: 1200px;
  margin: 0 auto 20px auto;
  background: rgba(79,142,247,0.08);
  border: 1px solid rgba(79,142,247,0.15);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 13px;
  color: #8b92a8;
}

.info-box strong {
  color: #4f8ef7;
}

.footer {
  max-width: 1200px;
  margin: 32px auto 0;
  text-align: center;
  font-size: 12px;
  color: #4a4f62;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

button {
  background: #1a1e2a;
  border: 1px solid #2a2f3f;
  color: #cbd5e1;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  border-color: #4f8ef7;
  color: #4f8ef7;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>📊 Soporte · Sistemas TI</h1>
    <p>Métricas en tiempo real desde Freshdesk</p>
  </div>
  <div class="status-badge">
    🎯 Grupo: <span>Soporte TI</span>
  </div>
</div>

<div class="info-box">
  🔄 Los datos se obtienen directamente de Freshdesk · Últimos 500 tickets · Filtrados por grupo "Soporte TI"
</div>

<div id="kpi-container">
  <div class="loading">
    <div class="spinner"></div>
    <p>Cargando tickets desde Freshdesk...</p>
  </div>
</div>

<div class="footer">
  <button onclick="loadData()">🔄 Actualizar</button>
  <span style="margin-left: 12px" id="update-time"></span>
</div>

<script>
// CONFIGURACIÓN
const DOMAIN = 'cmrenca';
const API_KEY = 'YKFiuvp9BHM1bNn88cqS';
const GROUP_NAME = 'Soporte TI'; // Nombre del grupo que te interesa

// Mapeo de estados
const statusMap = { 2: 'Open', 3: 'Pending', 4: 'Resolved', 5: 'Closed' };

// Obtener ID del grupo
async function getGroupId() {
  try {
    const url = `https://${DOMAIN}.freshdesk.com/api/v2/groups`;
    const response = await fetch(url, {
      headers: { 'Authorization': 'Basic ' + btoa(API_KEY + ':X') }
    });
    
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const groups = await response.json();
    const targetGroup = groups.find(g => g.name === GROUP_NAME);
    
    if (!targetGroup) {
      console.warn(`Grupo "${GROUP_NAME}" no encontrado. Mostrando todos los tickets.`);
      return null;
    }
    
    console.log(`✅ Grupo encontrado: ${targetGroup.name} (ID: ${targetGroup.id})`);
    return targetGroup.id;
  } catch (error) {
    console.error('Error obteniendo grupos:', error);
    return null;
  }
}

// Obtener tickets filtrados por grupo
async function fetchTickets(groupId = null) {
  let allTickets = [];
  let page = 1;
  const perPage = 100;
  let hasMore = true;
  
  while (hasMore && page <= 5) { // Máximo 5 páginas = 500 tickets
    try {
      let url = `https://${DOMAIN}.freshdesk.com/api/v2/tickets?page=${page}&per_page=${perPage}`;
      
      // Si tenemos ID de grupo, filtrar
      if (groupId) {
        url += `&group_id=${groupId}`;
      }
      
      const response = await fetch(url, {
        headers: { 'Authorization': 'Basic ' + btoa(API_KEY + ':X') }
      });
      
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const tickets = await response.json();
      
      if (tickets.length === 0) {
        hasMore = false;
      } else {
        allTickets.push(...tickets);
        page++;
      }
    } catch (error) {
      console.error('Error en página', page, error);
      throw error;
    }
  }
  
  return allTickets;
}

// Calcular KPIs
function calculateKPIs(tickets) {
  const total = tickets.length;
  const open = tickets.filter(t => t.status === 2).length;      // status 2 = Open
  const pending = tickets.filter(t => t.status === 3).length;   // status 3 = Pending
  const resolved = tickets.filter(t => t.status === 4).length;  // status 4 = Resolved
  const closed = tickets.filter(t => t.status === 5).length;    // status 5 = Closed
  
  return { total, open, pending, resolved, closed };
}

// Renderizar KPIs
function renderKPIs(stats, groupName) {
  const total = stats.total;
  
  const cards = [
    { label: '📋 TOTAL TICKETS', value: stats.total, color: '#4f8ef7', percent: null },
    { label: '🟢 ABIERTOS', value: stats.open, color: '#4f8ef7', percent: total ? Math.round(stats.open/total*100) : 0 },
    { label: '🟡 PENDIENTES', value: stats.pending, color: '#fbbf24', percent: total ? Math.round(stats.pending/total*100) : 0 },
    { label: '✅ RESUELTOS', value: stats.resolved, color: '#34d399', percent: total ? Math.round(stats.resolved/total*100) : 0 },
    { label: '🔒 CERRADOS', value: stats.closed, color: '#22d3ee', percent: total ? Math.round(stats.closed/total*100) : 0 }
  ];
  
  const html = `
    <div class="kpi-grid">
      ${cards.map(card => `
        <div class="kpi-card" style="--color: ${card.color}">
          <div class="kpi-label">${card.label}</div>
          <div class="kpi-number">${card.value}</div>
          ${card.percent !== null ? `<div class="kpi-percent">${card.percent}% del total</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('kpi-container').innerHTML = html;
}

// Función principal
async function loadData() {
  const container = document.getElementById('kpi-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando tickets desde Freshdesk...</p></div>';
  
  try {
    // 1. Obtener ID del grupo "Soporte TI"
    const groupId = await getGroupId();
    
    // 2. Obtener tickets del grupo
    const tickets = await fetchTickets(groupId);
    
    if (tickets.length === 0) {
      container.innerHTML = `<div class="error">
        ⚠️ No se encontraron tickets para el grupo "${GROUP_NAME}"<br>
        <small>Verifica que el nombre del grupo sea correcto en Freshdesk</small>
      </div>`;
      return;
    }
    
    // 3. Calcular KPIs
    const stats = calculateKPIs(tickets);
    
    // 4. Renderizar
    renderKPIs(stats, GROUP_NAME);
    
    // 5. Actualizar timestamp
    document.getElementById('update-time').textContent = 
      `Última actualización: ${new Date().toLocaleTimeString('es-CL')}`;
    
    console.log(`✅ Cargados ${tickets.length} tickets del grupo ${GROUP_NAME}`);
    
  } catch (error) {
    console.error('Error:', error);
    container.innerHTML = `<div class="error">
      ❌ Error conectando con Freshdesk: ${error.message}<br>
      <small>Verifica tu API key y dominio</small>
    </div>`;
  }
}

// Iniciar
loadData();
</script>
</body>
</html>
